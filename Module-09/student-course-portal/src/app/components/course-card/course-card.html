<div class="card">

  <h2>{{ course.name }}</h2>

  <p>{{ course.code }}</p>

  <ng-container *ngIf="enrolledIds$ | async as ids">
    <button type="button" (click)="ids.includes(course.id) ? unenroll() : enroll()">
      {{ ids.includes(course.id) ? 'Unenroll' : 'Enroll' }}
    </button>
  </ng-container>

</div>
